<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URP Student Hub</title>
    <!-- Tailwind CSS for modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .mono { font-family: 'JetBrains Mono', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <!-- Header Section -->
    <header class="border-b border-gray-800 bg-gray-950 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-emerald-400 tracking-wide">KUET URP'25</h1>
                <p class="text-xs text-gray-400 mono">The Planners' Digital Commons</p>
            </div>
            <button onclick="toggleAdminModal()" class="bg-gray-800 hover:bg-gray-700 text-sm px-3 py-1.5 rounded-lg border border-gray-700 text-gray-300 transition flex items-center gap-1.5">
                <span>➕</span> Share Update
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-5xl">
        <!-- Main Grid Layout -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- Left Column: Notice Board & Filters -->
            <div class="md:col-span-2 space-y-6">
                <!-- Filter Buttons -->
                <div class="bg-gray-950 p-4 rounded-xl border border-gray-800">
                    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 mono">Filter Feed</h3>
                    <div class="flex flex-wrap gap-2" id="filter-container">
                        <button onclick="filterNotices('all')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-emerald-500 text-gray-950 transition" id="btn-all">All Updates</button>
                        <button onclick="filterNotices('Exam')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-800 hover:bg-gray-700 text-gray-300 transition" id="btn-Exam">📝 Exams</button>
                        <button onclick="filterNotices('Class')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-800 hover:bg-gray-700 text-gray-300 transition" id="btn-Class">📚 Classes</button>
                        <button onclick="filterNotices('Lab')" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-800 hover:bg-gray-700 text-gray-300 transition" id="btn-Lab">💻 Labs & Maps</button>
                    </div>
                </div>

                <!-- Notices Container -->
                <div class="space-y-4" id="notices-container">
                    <!-- Dynamic notices will be loaded here -->
                </div>
            </div>

            <!-- Right Column: Sidebar (Deadlines & Resources) -->
            <div class="space-y-6">
                <!-- Deadlines / Countdown Section -->
                <div class="bg-gray-950 p-5 rounded-xl border border-gray-800">
                    <h3 class="text-base font-bold text-rose-400 mb-4 flex items-center gap-2 uppercase tracking-wide mono">
                        🚨 Urgent Deadlines
                    </h3>
                    <div class="space-y-4" id="deadlines-container">
                        <!-- Dynamic deadlines will be loaded here -->
                    </div>
                </div>

                <!-- Resources Section -->
                <div class="bg-gray-950 p-5 rounded-xl border border-gray-800">
                    <h3 class="text-base font-bold text-sky-400 mb-4 uppercase tracking-wide mono">📂 Drive & Materials</h3>
                    <ul class="space-y-3 text-sm">
                        <li>
                            <a href="#" class="block p-3 bg-gray-900 hover:bg-gray-800 rounded-lg border border-gray-800 transition">
                                <span class="font-semibold block text-gray-200">Books & Notes Vault</span>
                                <span class="text-xs text-gray-500">Shared cloud drive links for all semesters</span>
                            </a>
                        </li>
                        <li>
                            <a href="#" class="block p-3 bg-gray-900 hover:bg-gray-800 rounded-lg border border-gray-800 transition">
                                <span class="font-semibold block text-gray-200">Software Setup Guide</span>
                                <span class="text-xs text-gray-500">ArcGIS, QGIS, and Python libraries</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

        </div>
    </main>

    <!-- Admin Modal (Notice Input Form) -->
    <div id="admin-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-gray-950 border border-gray-800 rounded-xl max-w-md w-full p-6 space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-emerald-400">Create New Post</h3>
                <button onclick="toggleAdminModal()" class="text-gray-400 hover:text-white text-xl">&times;</button>
            </div>
            <form id="notice-form" onsubmit="saveNotice(event)" class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider mono">Topic / Title</label>
                    <input type="text" id="form-title" placeholder="e.g., URP 1100 Lab Submission" required class="w-full bg-gray-900 border border-gray-800 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-emerald-500 placeholder-gray-600">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider mono">Details</label>
                    <textarea id="form-desc" rows="3" placeholder="Write inside details here..." required class="w-full bg-gray-900 border border-gray-800 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-emerald-500 placeholder-gray-600"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider mono">Category</label>
                        <select id="form-category" class="w-full bg-gray-900 border border-gray-800 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-emerald-500">
                            <option value="Exam">📝 Exams</option>
                            <option value="Class">📚 Classes</option>
                            <option value="Lab">💻 Labs & Maps</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider mono">Deadline (Optional)</label>
                        <input type="datetime-local" id="form-deadline" class="w-full bg-gray-900 border border-gray-800 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-emerald-500">
                    </div>
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold p-2.5 rounded-lg text-sm transition mt-2">
                    Publish Post
                </button>
            </form>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Default Sample Data in English
        const defaultNotices = [
            { id: 1, title: "URP 1100 Lab Report Submission", desc: "Complete the base map layout and submit the exported PDF via the classroom link.", category: "Lab", date: "Jun 20, 2026", deadline: new Date(Date.now() + 172800000).toISOString() },
            { id: 2, title: "Tomorrow's Morning Lab Rescheduled", desc: "The 9:00 AM lab session has been moved to 2:00 PM due to unavoidable circumstances. Room 302.", category: "Class", date: "Jun 19, 2026", deadline: "" }
        ];

        let notices = JSON.parse(localStorage.getItem('urp_notices')) || defaultNotices;
        let currentFilter = 'all';

        function toggleAdminModal() {
            document.getElementById('admin-modal').classList.toggle('hidden');
        }

        function renderNotices() {
            const container = document.getElementById('notices-container');
            container.innerHTML = '';

            const filtered = currentFilter === 'all' ? notices : notices.filter(n => n.category === currentFilter);

            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-gray-500 text-sm mono">No updates found in this category.</div>`;
                return;
            }

            filtered.forEach(notice => {
                let badgeColor = notice.category === 'Exam' ? 'bg-rose-500/10 text-rose-400 border-rose-500/20' : 
                                 notice.category === 'Class' ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' : 
                                 'bg-sky-500/10 text-sky-400 border-sky-500/20';
                
                let badgeText = notice.category === 'Exam' ? '📝 Exam' : notice.category === 'Class' ? '📚 Class' : '💻 Lab';

                container.innerHTML += `
                    <div class="bg-gray-950 p-5 rounded-xl border border-gray-800 relative group hover:border-gray-700 transition">
                        <div class="flex justify-between items-start gap-4 mb-2">
                            <span class="text-xs px-2.5 py-1 rounded-full border ${badgeColor} mono font-medium">${badgeText}</span>
                            <span class="text-xs text-gray-500 mono">${notice.date}</span>
                        </div>
                        <h4 class="text-lg font-bold text-gray-100 mb-2">${notice.title}</h4>
                        <p class="text-sm text-gray-400 leading-relaxed">${notice.desc}</p>
                        <button onclick="deleteNotice(${notice.id})" class="absolute top-4 right-4 text-gray-600 hover:text-rose-400 text-xs opacity-0 group-hover:opacity-100 transition mono">✕ Delete</button>
                    </div>
                `;
            });

            renderDeadlines();
        }

        function filterNotices(category) {
            currentFilter = category;
            const buttons = ['all', 'Exam', 'Class', 'Lab'];
            buttons.forEach(b => {
                const btn = document.getElementById(`btn-${b}`);
                if(b === category) {
                    btn.classList.remove('bg-gray-800', 'text-gray-300');
                    btn.classList.add('bg-emerald-500', 'text-gray-950');
                } else {
                    btn.classList.remove('bg-emerald-500', 'text-gray-950');
                    btn.classList.add('bg-gray-800', 'text-gray-300');
                }
            });
            renderNotices();
        }

        function saveNotice(e) {
            e.preventDefault();
            const title = document.getElementById('form-title').value;
            const desc = document.getElementById('form-desc').value;
            const category = document.getElementById('form-category').value;
            const deadline = document.getElementById('form-deadline').value;

            const newNotice = {
                id: Date.now(),
                title,
                desc,
                category,
                date: new Date().toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' }),
                deadline: deadline ? new Date(deadline).toISOString() : ""
            };

            notices.unshift(newNotice);
            localStorage.setItem('urp_notices', JSON.stringify(notices));
            
            document.getElementById('notice-form').reset();
            toggleAdminModal();
            renderNotices();
        }

        function deleteNotice(id) {
            if(confirm('Are you sure you want to delete this post?')) {
                notices = notices.filter(n => n.id !== id);
                localStorage.setItem('urp_notices', JSON.stringify(notices));
                renderNotices();
            }
        }

        function renderDeadlines() {
            const container = document.getElementById('deadlines-container');
            container.innerHTML = '';
            
            const withDeadlines = notices.filter(n => n.deadline && new Date(n.deadline) > new Date());

            if(withDeadlines.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-500 text-center py-2 mono">No active deadlines!</p>`;
                return;
            }

            withDeadlines.forEach(n => {
                container.innerHTML += `
                    <div class="p-3 bg-gray-900 rounded-lg border border-gray-800">
                        <span class="text-xs text-gray-400 block truncate font-medium">${n.title}</span>
                        <span class="text-xs font-bold text-rose-400 data-countdown mono" data-time="${n.deadline}">Calculating...</span>
                    </div>
                `;
            });
        }

        // Live Countdown Timer logic
        setInterval(() => {
            document.querySelectorAll('.data-countdown').forEach(el => {
                const target = new Date(el.getAttribute('data-time')).getTime();
                const now = new Date().getTime();
                const diff = target - now;

                if (diff <= 0) {
                    el.innerText = "Deadline Passed!";
                    el.classList.remove('text-rose-400');
                    el.classList.add('text-gray-500');
                } else {
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    
                    el.innerText = `${days}d ${hours}h ${mins}m left`;
                }
            });
        }, 1000);

        // Initial Load
        renderNotices();
    </script>
</body>
</html>
